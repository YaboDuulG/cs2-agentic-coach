#cloud-config
package_update: true
packages:
  - wget
  - lib32gcc-s1
  - jq

users:
  - name: steam
    groups: sudo
    shell: /bin/bash
    sudo: ['ALL=(ALL) NOPASSWD:ALL']

write_files:
  - path: /etc/systemd/system/cs2.service
    content: |
      [Unit]
      Description=CS2 Dedicated Server
      After=network.target

      [Service]
      Type=simple
      User=steam
      WorkingDirectory=/home/steam/cs2
      ExecStart=/home/steam/cs2/game/bin/linuxsteamrt64/cs2 -dedicated +map de_dust2 +servercfgfile server.cfg -maxplayers 12
      Restart=on-failure

      [Install]
      WantedBy=multi-user.target

runcmd:
  # 1. Install SteamCMD (only if not already present)
  - |
    if [ ! -d /home/steam/steamcmd ]; then
      sudo -u steam mkdir -p /home/steam/steamcmd
      sudo -u steam wget -qO- https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz | sudo -u steam tar zxf - -C /home/steam/steamcmd
    fi

  # 2. Download CS2 (only if not already present)
  - |
    if [ ! -d /home/steam/cs2/game/bin/linuxsteamrt64 ]; then
      # NOTE: In production, uncomment the real download step. For development/mocking:
      sudo -u steam mkdir -p /home/steam/cs2/game/bin/linuxsteamrt64
      sudo -u steam mkdir -p /home/steam/cs2/game/csgo/cfg
      echo '#!/bin/bash\nwhile true; do sleep 60; done' > /home/steam/cs2/game/bin/linuxsteamrt64/cs2
      chmod +x /home/steam/cs2/game/bin/linuxsteamrt64/cs2
    fi

  # 3. Apply passwords
  - echo "rcon_password __RCON_PASSWORD__\nsv_password __SERVER_PASSWORD__" > /home/steam/cs2/game/csgo/cfg/server.cfg

  # 4. Notify our backend that the server is ready (webhook)
  - curl -X POST __WEBHOOK_URL__ -H "Content-Type: application/json" -d '{"server_id": "__SERVER_ID__", "status": "active"}'

  # 5. Start the CS2 server daemon
  - systemctl daemon-reload
  - systemctl enable cs2.service
  - systemctl restart cs2.service
