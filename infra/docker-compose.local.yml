version: "3.9"

# Local development mirror of GCP services.
# This does NOT run on GCP — Cloud Run / Cloud SQL are used in prod.
# Use this for local testing without hitting cloud costs.

services:

  # --- PostgreSQL (mirrors Cloud SQL schema) ---
  postgres:
    image: pgvector/pgvector:pg15
    container_name: chinghis-postgres
    environment:
      POSTGRES_USER: chinghis_user
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: chinghis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chinghis_user -d chinghis"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- FastAPI (local API server) ---
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    container_name: chinghis-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL_LOCAL=postgresql://chinghis_user:localdev@postgres:5432/chinghis
      - APP_ENV=development
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
