name: CI — Lint & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, staging]

jobs:
  lint-and-test:
    name: Lint, type-check & unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install CI dependencies
        # Use requirements-ci.txt — excludes heavy native-binary packages
        # (pyannote.audio, etc.) that break on fresh runners.
        run: pip install -r requirements-ci.txt ruff mypy pytest pytest-asyncio httpx

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy agents/ api/ --ignore-missing-imports

      - name: Run unit tests
        run: pytest tests/ -v --tb=short
        env:
          APP_ENV: test
