name: CI — Lint & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, staging]

jobs:
  lint-and-test:
    name: Lint, type-check & unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt ruff mypy pytest pytest-asyncio

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy agents/ api/ --ignore-missing-imports

      - name: Run unit tests
        run: pytest tests/ -v --tb=short
        env:
          APP_ENV: test
