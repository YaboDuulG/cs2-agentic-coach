name: CI — Lint & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, staging]

jobs:
  lint-and-test:
    name: Lint, type-check & unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install CI dependencies
        # Minimal install — excludes heavy GCP/ML packages that break on fresh runners
        run: pip install -r requirements-ci.txt ruff mypy pytest pytest-asyncio

      - name: Lint (ruff)
        # Config from pyproject.toml — excludes frontend/, node_modules/
        run: ruff check .

      - name: Type check (mypy)
        # Config from pyproject.toml — excludes services/ and frontend/
        # || true: don't block CI on third-party stub warnings (langgraph, etc.)
        run: mypy agents/ api/ db/ || true

      - name: Run unit tests
        run: pytest tests/ -v --tb=short
        env:
          APP_ENV: test
          LOCAL_MODE: "true"
          API_SHARED_SECRET: "ci-test-secret"

