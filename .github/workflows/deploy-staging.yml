name: Deploy — Cloud Run (Staging)

on:
  push:
    branches: [main, staging]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  CLOUD_SQL_INSTANCE: ${{ secrets.GCP_PROJECT_ID }}:${{ secrets.GCP_REGION }}:demosage-db
  SA_EMAIL: demosage-dev@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com

jobs:
  deploy-staging:
    name: Build & deploy to staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Sanitize env vars (strip hidden \r from secrets)
        run: |
          echo "PROJECT_ID=$(echo "$PROJECT_ID" | tr -d '\r')" >> $GITHUB_ENV
          echo "REGION=$(echo "$REGION" | tr -d '\r')" >> $GITHUB_ENV
          echo "CLOUD_SQL_INSTANCE=$(echo "$CLOUD_SQL_INSTANCE" | tr -d '\r')" >> $GITHUB_ENV
          echo "SA_EMAIL=$(echo "$SA_EMAIL" | tr -d '\r')" >> $GITHUB_ENV

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      # -------------------------------------------------------
      # API Service
      # -------------------------------------------------------
      - name: Build & push API image
        run: |
          docker build -f infra/Dockerfile.api -t gcr.io/${{ env.PROJECT_ID }}/demosage-api:${{ github.sha }} -t gcr.io/${{ env.PROJECT_ID }}/demosage-api:staging .
          docker push gcr.io/${{ env.PROJECT_ID }}/demosage-api:${{ github.sha }}
          docker push gcr.io/${{ env.PROJECT_ID }}/demosage-api:staging

      - name: Deploy API to Cloud Run (staging)
        run: |
          gcloud run deploy demosage-api-staging --image gcr.io/${{ env.PROJECT_ID }}/demosage-api:${{ github.sha }} --platform managed --region ${{ env.REGION }} --allow-unauthenticated --service-account ${{ env.SA_EMAIL }} --add-cloudsql-instances ${{ env.CLOUD_SQL_INSTANCE }} --set-env-vars APP_ENV=staging,LOCAL_MODE=false --set-secrets DATABASE_URL=DATABASE_URL:latest,GCS_BUCKET=GCS_BUCKET:latest,API_SECRET_KEY=API_SECRET_KEY:latest,VULTR_API_KEY=VULTR_API_KEY:latest,GCP_SA_KEY=GCP_SA_KEY:latest,DATHOST_EMAIL=DATHOST_EMAIL:latest,DATHOST_PASSWORD=DATHOST_PASSWORD:latest,API_SHARED_SECRET=API_SHARED_SECRET:latest --quiet


      - name: Run DB migrations (create tables)
        continue-on-error: true
        run: |
          gcloud run jobs delete demosage-migrate-staging --region ${{ env.REGION }} --project ${{ env.PROJECT_ID }} --quiet 2>/dev/null || true
          gcloud run jobs create demosage-migrate-staging --image gcr.io/${{ env.PROJECT_ID }}/demosage-api:${{ github.sha }} --region ${{ env.REGION }} --service-account ${{ env.SA_EMAIL }} --set-cloudsql-instances ${{ env.CLOUD_SQL_INSTANCE }} --set-secrets DATABASE_URL=DATABASE_URL:latest --command python --args "-c,from db.database import engine; from db.models import Base; Base.metadata.create_all(engine); print('Tables OK')" --project ${{ env.PROJECT_ID }} --quiet
          gcloud run jobs execute demosage-migrate-staging --region ${{ env.REGION }} --project ${{ env.PROJECT_ID }} --wait --quiet

      # -------------------------------------------------------
      # Scout Service (internal — no unauthenticated access)
      # -------------------------------------------------------
      - name: Build & push Scout image
        run: |
          docker build -f services/scout/Dockerfile -t gcr.io/${{ env.PROJECT_ID }}/demosage-scout:${{ github.sha }} -t gcr.io/${{ env.PROJECT_ID }}/demosage-scout:staging .
          docker push gcr.io/${{ env.PROJECT_ID }}/demosage-scout:${{ github.sha }}
          docker push gcr.io/${{ env.PROJECT_ID }}/demosage-scout:staging

      - name: Deploy Scout to Cloud Run (staging)
        run: |
          gcloud run deploy demosage-scout-staging --image gcr.io/${{ env.PROJECT_ID }}/demosage-scout:${{ github.sha }} --platform managed --region ${{ env.REGION }} --no-allow-unauthenticated --service-account ${{ env.SA_EMAIL }} --add-cloudsql-instances ${{ env.CLOUD_SQL_INSTANCE }} --set-env-vars APP_ENV=staging,LOCAL_MODE=false --set-secrets DATABASE_URL=DATABASE_URL:latest --set-secrets GCS_BUCKET=GCS_BUCKET:latest --memory 4Gi --cpu 2 --quiet
