name: HLTV Initial Seeding

on:
  workflow_dispatch:
    inputs:
      limit_per_team:
        description: 'Maximum matches to scrape per team'
        required: true
        default: '3'
        type: string

jobs:
  seed:
    name: Clear & Reseed HLTV Pro Matches
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Clear existing seeding data
        run: python scripts/clear_seeding.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run HLTV Seeding (Scrape & Embed)
        run: python scripts/seed_pro_matches.py --limit-per-team ${{ github.event.inputs.limit_per_team }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Backup Knowledge Base Ingestion Scan
        run: python scripts/update_knowledge_base.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
